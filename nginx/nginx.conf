# PDFOrca reverse proxy.
#
# Routes one domain to two upstreams:
#   /api/*  -> backend  (FastAPI/Gunicorn on :8000)
#   /*      -> frontend (Next.js standalone on :3000)
#
# Tuned for large file uploads and long conversions (LibreOffice/OCR).
# TLS is wired for Let's Encrypt; see DEPLOY.md for the certbot bootstrap.

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

# gzip (text assets / JSON; binaries like PDF are already compressed)
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript
           text/xml application/xml application/xml+rss text/javascript
           image/svg+xml;

# HTTP :80 — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name pdforca.com www.pdforca.com;

    # Certbot webroot challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443
server {
    listen 443 ssl;
    http2 on;
    server_name pdforca.com www.pdforca.com;

    # Certs issued by certbot (mounted from the host — see docker-compose).
    ssl_certificate     /etc/letsencrypt/live/pdforca.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pdforca.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Largest upload = PRO_MAX_UPLOAD_SIZE (100 MB). Keep in sync with the
    # backend UploadSizeLimitMiddleware / settings.MAX_UPLOAD_SIZE.
    client_max_body_size 100m;

    # Long conversions must not be cut off by the proxy.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 30s;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API -> backend
    location /api/ {
        proxy_pass http://backend;
        # Stream file downloads straight through; don't buffer big responses.
        proxy_buffering off;
    }

    # Backend health (optional direct hit, bypasses /api prefix).
    location = /health {
        proxy_pass http://backend/health;
        access_log off;
    }

    # Everything else -> Next.js frontend
    location / {
        proxy_pass http://frontend;
    }
}
