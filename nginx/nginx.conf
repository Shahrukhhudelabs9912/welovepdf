# PDFOrca reverse proxy.
#
# Routes one domain to two upstreams:
#   /api/*  -> backend  (FastAPI/Gunicorn on :8000)
#   /*      -> frontend (Next.js standalone on :3000)
#
# Tuned for large file uploads and long conversions (LibreOffice/OCR).
# TLS is wired for Let's Encrypt; see DEPLOY.md for the certbot bootstrap.
#
# Cloudflare sits in front — restore the real visitor IP from their
# CF-Connecting-IP header so rate limiting / logs see the actual client.

# ── Cloudflare IP ranges (IPv4) ──────────────────────────────────────
# Source: https://www.cloudflare.com/ips-v4  (check periodically)
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
# ── Cloudflare IP ranges (IPv6) ──────────────────────────────────────
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

proxy_cache_path /var/cache/nginx/pages levels=1:2
                 keys_zone=pages:10m max_size=200m inactive=10m
                 use_temp_path=off;

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

# gzip (text assets / JSON; binaries like PDF are already compressed)
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript
           text/xml application/xml application/xml+rss text/javascript
           image/svg+xml;

# HTTP :80 — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name pdforca.com www.pdforca.com;

    # Certbot webroot challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443
server {
    listen 443 ssl;
    http2 on;
    server_name pdforca.com www.pdforca.com;

    # Certs issued by certbot (mounted from the host — see docker-compose).
    ssl_certificate     /etc/letsencrypt/live/pdforca.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pdforca.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Largest upload = PRO_MAX_UPLOAD_SIZE (100 MB). Keep in sync with the
    # backend UploadSizeLimitMiddleware / settings.MAX_UPLOAD_SIZE.
    client_max_body_size 100m;

    # Long conversions must not be cut off by the proxy.
    # Slightly longer than Gunicorn's 300s timeout so the backend can
    # return a proper error before Nginx gives up (avoids 502 race).
    proxy_read_timeout 310s;
    proxy_send_timeout 310s;
    proxy_connect_timeout 30s;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API -> backend
    location /api/ {
        proxy_pass http://backend;
        # Stream file downloads straight through; don't buffer big responses.
        proxy_buffering off;
    }

    # Backend health (optional direct hit, bypasses /api prefix).
    location = /health {
        proxy_pass http://backend/health;
        access_log off;
    }

    # Everything else -> Next.js frontend (with proxy cache)
    location / {
        proxy_pass http://frontend;

        # Cache SSR pages for 5 minutes — eliminates re-render per request.
        # Next.js sends Cache-Control: private/no-store on SSR — override it.
        proxy_ignore_headers Cache-Control Set-Cookie Expires;
        proxy_hide_header Set-Cookie;
        proxy_cache pages;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 301 302 1m;
        proxy_cache_valid any 0;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        # Don't cache POST or non-GET requests.
        proxy_cache_methods GET HEAD;

        # Pass cache status in response header (useful for debugging).
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Next.js static assets — long-lived, immutable hashes in the filename.
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache pages;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }
}
